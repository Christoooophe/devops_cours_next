name: CI
on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install node
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: npm install
        run: npm install

      - name: build
        run: npm run build

      - name: test
        run: npx tsx app/__tests__/accueil.test.tsx

