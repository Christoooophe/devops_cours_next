name: CI
on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Start container
        run: docker compose up -d

      - name: Install dependencies
        run: docker compose exec -T app sh -c "npm install"

      - name: Build app
        run: docker compose exec -T app sh -c "npm run build"

      - name: Start Next app
        run: docker compose exec -T app sh -c "npm run start &"

      - name: Run Vitest
        run: docker compose exec -T app sh -c "npm test"

      - name: Stop app
        if: always()
        run: docker compose down --remove-orphans
